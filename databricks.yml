bundle:
  name: agent_langgraph_short_term_memory

variables:
  resource_name_suffix:
    description: "Suffix for resource names to avoid collisions"
  lakebase_database_id:
    description: "Lakebase database ID (auto-generated, find in UI after first deploy)"
    default: "db-vtfa-2rwmdpc6pg"

resources:
  experiments:
    agent_experiment:
      name: /Users/${workspace.current_user.userName}/agent-langgraph-stm-exp

  postgres_projects:
    agent_lakebase:
      project_id: 'agent-stm-db-${var.resource_name_suffix}'
      display_name: 'Agent LangGraph STM DB'
      pg_version: 17

  apps:
    agent_langgraph_short_term_memory:
      name: "agent-langgraph-stm"
      description: "LangGraph agent application with short-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          # Autoscaling Lakebase config
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "agent-stm-db-${var.resource_name_suffix}"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "production"
          # Use for provisioned lakebase resource
          # - name: LAKEBASE_INSTANCE_NAME
          #   value: "<your-lakebase-instance-name>"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ${resources.experiments.agent_experiment.id}
            permission: 'CAN_MANAGE'
        # Autoscaling postgres resource
        # See: .claude/skills/add-tools/examples/lakebase-autoscaling.yaml
        - name: 'postgres'
          postgres:
            branch: "projects/agent-stm-db-${var.resource_name_suffix}/branches/production"
            database: "projects/agent-stm-db-${var.resource_name_suffix}/branches/production/databases/${var.lakebase_database_id}"
            permission: 'CAN_CONNECT_AND_CREATE'
        # Use for provisioned lakebase resource
        # - name: 'database'
        #   database:
        #     instance_name: '<your-lakebase-instance-name>'
        #     database_name: 'databricks_postgres'
        #     permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev-${workspace.current_user.domain_friendly_name}
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_langgraph_short_term_memory:
          name: agent-langgraph-stm
